name: Déployer la documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs-site/**'
      - 'dist/**'
      - 'scss/**'
      - 'tokens/**'
      - 'scripts/sync-pages-metadata-en.mjs'
      - 'scripts/generate-colors-doc.mjs'
      - 'scripts/sync-docs-public.mjs'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Installer les dépendances
        run: |
          npm ci
          npm ci --prefix docs-site

      - name: Build PimentCSS + documentation Astro
        run: npm run build:docs:astro

      - name: Verify documented classes exist in built CSS
        run: npm run test:doc-classes

      - name: Impeccable documentation checks
        run: npm run test:doc-impeccable

      - name: Tests UX documentation (desktop)
        run: npx playwright test tests/ux/responsive-documentation.spec.ts --project=desktop
        env:
          CI: true
          PLAYWRIGHT_AUTO_FIX: '0'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
